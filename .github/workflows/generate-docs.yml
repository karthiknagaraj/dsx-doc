name: Auto-Generate DSX Documentation

# Trigger: Run when .dsx files are pushed to the repo
on:
  push:
    branches: [ main ]
    paths:
      - 'dsx_files_input/**/*.dsx'  # Only run when .dsx files change
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-documentation:
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Get the code
    - name: Checkout repository
      uses: actions/checkout@v3
    
    # Step 2: Setup Python
    - name: Setup Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    # Step 4: Generate documentation
    - name: Generate DSX documentation
      env:
        DSX_API_KEY: ${{ secrets.DSX_API_KEY }}
      run: |
        python dsx_docs_cli.py \
          --input ./dsx_files_input/ \
          --output ./dsx_docs_output/ \
          --workers 4 \
          --skip-unchanged \
          --json-output results.json \
          --verbose
    
    # Step 5: Commit the generated docs back to repo
    - name: Commit documentation
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add dsx_docs_output/
        git add results.json
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || git commit -m "📝 Auto-generate DSX documentation [skip ci]"
    
    # Step 6: Push changes back to GitHub
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref }}
